name: Advanced C++ CI

on:
  push:
    branches: [ "master" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.cc'
      - '**.cxx'
      - 'CMakeLists.txt'
      - '**.cmake'
      - 'third_party/**'
      - '.github/workflows/**'

  pull_request:
    branches: [ "master" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - 'CMakeLists.txt'
      - '**.cmake'
      - 'third_party/**'

  workflow_dispatch:

# ── 自动创建 Release 的权限 ──
permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl1-mesa-dev libwayland-dev wayland-protocols libxkbcommon-dev \
          pkg-config

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -Wno-dev
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}

    # ═══════════════════════════════════════════════════════════════
    # 打包构建产物：收集可执行文件 + 依赖资源
    # ═══════════════════════════════════════════════════════════════
    - name: Package Artifacts (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        # 收集的 sandbox 应用（主入口）
        APPS=("Sandbox" "EditorDemo")
        
        # 创建打包目录
        PKG_DIR="${{ github.workspace }}/pkg/Sandbox"
        mkdir -p "$PKG_DIR/assets"

        # 复制资产目录
        cp -r "${{ github.workspace }}/assets"/* "$PKG_DIR/assets/" 2>/dev/null || true

        # 复制可执行文件（MSVC 多配置生成器输出在 Release/ 子目录）
        BIN_DIR="${{ steps.strings.outputs.build-output-dir }}/sandbox"
        for app in "${APPS[@]}"; do
          exe="$BIN_DIR/${app}/Release/${app}.exe"
          if [ -f "$exe" ]; then
            cp "$exe" "$PKG_DIR/"
          fi
        done

        # 复制 OpenAL32.dll（在 build/bin/Release/ 下）
        OPENAL_DIR="${{ steps.strings.outputs.build-output-dir }}/bin/Release"
        if [ -f "$OPENAL_DIR/OpenAL32.dll" ]; then
          cp "$OPENAL_DIR/OpenAL32.dll" "$PKG_DIR/"
        elif [ -f "$OPENAL_DIR/soft_oal.dll" ]; then
          cp "$OPENAL_DIR/soft_oal.dll" "$PKG_DIR/OpenAL32.dll"
        fi

        # 复制 VC++ 运行时 DLL（可选，目标机可能没有安装 VC++ Redist）
        # 通常 GitHub Actions 的 windows-latest 会带，但为保险可拷贝
        # 实际发布时建议使用静态链接或附带 redist 安装包

        # 打包为 ZIP（Windows 使用 7z 代替 zip）
        cd "${{ github.workspace }}/pkg"
        7z a "Sandbox-windows-x64.zip" "Sandbox/"
        echo "PACKAGE_PATH=${{ github.workspace }}/pkg/Sandbox-windows-x64.zip" >> "$GITHUB_ENV"

    - name: Package Artifacts (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # 收集的 sandbox 应用
        APPS=("Sandbox" "EditorDemo")

        PKG_DIR="${{ github.workspace }}/pkg/Sandbox"
        mkdir -p "$PKG_DIR/assets"

        # 复制资产目录
        cp -r "${{ github.workspace }}/assets"/* "$PKG_DIR/assets/" 2>/dev/null || true

        # 复制可执行文件
        BIN_DIR="${{ steps.strings.outputs.build-output-dir }}/sandbox"
        for app in "${APPS[@]}"; do
          exe="$BIN_DIR/${app}/${app}"
          if [ -f "$exe" ]; then
            cp "$exe" "$PKG_DIR/"
            chmod +x "$PKG_DIR/${app}"
          fi
        done

        # 打包为 tar.gz
        cd "${{ github.workspace }}/pkg"
        tar -czf "Sandbox-linux-x64.tar.gz" "Sandbox/"
        echo "PACKAGE_PATH=${{ github.workspace }}/pkg/Sandbox-linux-x64.tar.gz" >> "$GITHUB_ENV"

    # ═══════════════════════════════════════════════════════════════
    # 上传构建产物作为 workflow artifact
    # ═══════════════════════════════════════════════════════════════
    - name: Upload as Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sandbox-${{ matrix.os }}-${{ matrix.c_compiler }}-${{ github.sha }}
        path: ${{ env.PACKAGE_PATH }}
        if-no-files-found: warn
